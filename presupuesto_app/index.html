<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SISPIC - Presupuestos CCTV</title>
<link rel="manifest" href="manifest.json">

<style>*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
:root{--primary:#1a237e;--primary-light:#3949ab;--accent:#00bcd4;--bg:#eef0ff;--surface:#fff;--text:#212121;--text2:#616161;--border:#e0e0e0;--danger:#d32f2f;--success:#2e7d32}
body{background:var(--bg);color:var(--text);min-height:100vh}
.hd{background:var(--primary);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hd img{height:26px}
.hd h1{font-size:14px;font-weight:600;flex:1;text-align:center}
.nav{display:flex;background:var(--primary-light)}
.nav button{color:rgba(255,255,255,.7);background:none;border:none;padding:10px 0;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;flex:1}
.nav button.active{border-bottom-color:#00bcd4;color:#fff;font-weight:700}
.pg{display:none;padding:13px;max-width:640px;margin:0 auto;padding-bottom:80px}
.pg.active{display:block}
.card{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:13px;box-shadow:0 2px 10px rgba(26,35,126,.09)}
.card h2{font-size:15px;color:var(--primary);margin-bottom:12px;font-weight:700}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff}
.bs{background:var(--success);color:#fff}
.bd{background:var(--danger);color:#fff}
.bo{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.bsm{width:auto;padding:5px 10px;font-size:12px;border-radius:7px}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#e8eaf6;color:#283593}
.pi{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pn{font-weight:700;font-size:14px;flex:1;line-height:1.3}
.pd{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:12px;color:var(--text2);margin-top:7px}
.pd span{display:flex;flex-direction:column;gap:2px}
.pd strong{color:var(--text);font-size:13px}
.qi{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;cursor:pointer}
.qi:active{opacity:.8}
.qm{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.qc{font-weight:700;font-size:14px}
.qf{font-size:11px;color:var(--text2)}
.qt{font-size:16px;font-weight:700;color:var(--primary)}
.qs{font-size:12px;color:var(--text2);margin-top:3px}
.empty{text-align:center;padding:28px 14px;color:var(--text2)}
.ei{font-size:44px;margin-bottom:10px}
.sb{position:relative;margin-bottom:11px}
.sb input{padding-left:34px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.ov.open{display:flex}
.mo{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px;padding-bottom:28px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mt{font-size:17px;font-weight:700;color:var(--primary)}
.xb{background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ir{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.ir:last-child{border-bottom:none}
.in{flex:1;line-height:1.4}
.iq{color:var(--text2);margin:0 6px;font-size:12px}
.ip{font-weight:700;color:var(--primary)}
.sr{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.st{font-size:15px;font-weight:700;color:var(--primary);border-top:2px solid var(--border);padding-top:9px;margin-top:3px}
.fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 14px rgba(26,35,126,.45);z-index:50;display:flex;align-items:center;justify-content:center}
.chip{display:inline-flex;background:#f0f0f0;border:1px solid var(--border);border-radius:20px;padding:4px 9px;font-size:12px;cursor:pointer;margin:2px}
.chip.on{background:#e8eaf6;border-color:var(--primary-light);color:var(--primary);font-weight:700}
.ir2{display:flex;gap:6px;margin-bottom:5px;font-size:13px;line-height:1.4}
.ir2 .lb{color:var(--text2);min-width:70px;font-weight:600}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(prefers-color-scheme:dark){:root{--bg:#0e1030;--surface:#181b40;--text:#dde0ff;--text2:#8080a0;--border:#2a2d60}input,select,textarea{background:#181b40;color:#dde0ff;border-color:#2a2d60}.pi,.qi,.mo{background:#181b40}.xb{background:#2a2d60;color:#dde0ff}.chip{background:#2a2d60}}
</style>
</head>

<div id="p-presupuestos" class="pg active">

<div id="p-productos" class="pg">

<div id="p-nuevo" class="pg">
  <div class="card">
    <h2>&#128100; Datos del Cliente</h2>
    <div class="fg"><label>Nombre del Cliente</label><input type="text" id="cn" placeholder="Nombre completo"></div>
    <div class="fr">
      <div class="fg"><label>Telefono</label><input type="tel" id="ct" placeholder="(0981) 000-000"></div>
      <div class="fg"><label>Ciudad</label><input type="text" id="cc" placeholder="Asuncion"></div>
    </div>
    <div class="fg"><label>Direccion</label><input type="text" id="cd" placeholder="Calle, N, Barrio"></div>

  </div>

function fm(n,m){if(m==='USD')return 'USD '+parseFloat(n).toFixed(2);if(m==='BRL')return 'R$ '+parseFloat(n).toFixed(2);return '\u20b2 '+Math.round(n).toLocaleString('es-PY');}
function gm(){return document.getElementById('cm')?.value||'PYG';}
function pg(p){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById('p-'+p).classList.add('active');
  ['presupuestos','productos','nuevo'].forEach((n,i)=>{if(n===p)document.querySelectorAll('.nav button')[i].classList.add('active');});
  if(p==='presupuestos')rQ();
  if(p==='productos')rP();
  if(p==='nuevo')rI();
}
function resetN(){['cn','ct','cc','cd','co'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('desc').value='0';items=[];rI();}
function rQ(){
  const q=(document.getElementById('sq')?.value||'').toLowerCase();
  const list=quots.filter(x=>x.cliente.toLowerCase().includes(q)).sort((a,b)=>b.fecha-a.fecha);
  const el=document.getElementById('lista-q');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">&#128203;</div><p>Sin presupuestos aun</p><p style="font-size:12px;margin-top:5px">Toca + para crear el primero</p></div>';return;}
  el.innerHTML=list.map(x=>'<div class="qi" onclick="vQ('+x.id+')"><div class="qm"><span class="qc">'+x.cliente+'</span><span class="tag">#'+String(x.numero).padStart(4,'0')+'</span></div><div style="display:flex;justify-content:space-between;align-items:center"><span class="qf">'+new Date(x.fecha).toLocaleDateString('es-PY',{day:'2-digit',month:'short',year:'numeric'})+'</span><span class="qt">'+fm(x.total,x.moneda)+'</span></div><div class="qs">'+x.items.length+' producto(s)'+(x.ciudad?' · '+x.ciudad:'')+'</div></div>').join('');
}
function rP(){
  const q=(document.getElementById('sp')?.value||'').toLowerCase();
  const list=prods.filter(x=>x.n.toLowerCase().includes(q)||x.c.toLowerCase().includes(q));
  const el=document.getElementById('lista-p');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">&#128230;</div><p>Sin productos</p></div>';return;}
  el.innerHTML=list.map(x=>'<div class="pi"><div class="ph"><span class="pn">'+x.n+'</span><div style="display:flex;gap:5px"><button class="btn bo bsm" onclick="eP('+x.id+')">&#9998;</button><button class="btn bd bsm" onclick="dP('+x.id+')">&#128465;</button></div></div><div style="margin:4px 0"><span class="tag">'+x.c+'</span></div><div class="pd"><span>Precio<strong>'+fm(x.p,'PYG')+'</strong></span><span>Por<strong>'+x.u+'</strong></span><span>Info<strong style="font-size:11px">'+x.d.substring(0,22)+'</strong></span></div></div>').join('');
}
function rI(){
  const el=document.getElementById('il');
  if(!items.length){el.innerHTML='<div class="empty" style="padding:14px"><div class="ei">&#128722;</div><p>Sin productos</p></div>';}
  else{el.innerHTML=items.map((it,i)=>'<div class="ir"><div class="in"><strong>'+it.n+'</strong><br><span style="font-size:11px;color:var(--text2)">'+it.q+' '+it.u+' x '+fm(it.p,gm())+'</span></div><span class="ip">'+fm(it.q*it.p,gm())+'</span><button onclick="rmI('+i+')" style="background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;margin-left:6px">x</button></div>').join('');}
  cT();
}
function rmI(i){items.splice(i,1);rI();}
function cT(){
  const el=document.getElementById('tot');
  const sub=items.reduce((s,it)=>s+it.q*it.p,0);
  const d=parseFloat(document.getElementById('desc')?.value||0);
  const dm=sub*d/100,tot=sub-dm,m=gm();
  el.innerHTML='<div style="border-top:1.5px solid var(--border);padding-top:10px"><div class="sr"><span>Subtotal</span><span>'+fm(sub,m)+'</span></div>'+(d>0?'<div class="sr" style="color:var(--danger)"><span>Descuento ('+d+'%)</span><span>-'+fm(dm,m)+'</span></div>':'')+'<div class="sr st"><span>TOTAL</span><span>'+fm(tot,m)+'</span></div></div>';
}
function oMP(){['mn','md','mpr','mid'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('mpt').textContent='Nuevo Producto';oM('mo-p');}
function eP(id){const x=prods.find(p=>p.id===id);if(!x)return;document.getElementById('mn').value=x.n;document.getElementById('mc').value=x.c;document.getElementById('md').value=x.d;document.getElementById('mpr').value=x.p;document.getElementById('mu').value=x.u;document.getElementById('mid').value=x.id;document.getElementById('mpt').textContent='Editar Producto';oM('mo-p');}
function sP(){const n=document.getElementById('mn').value.trim();const pr=parseFloat(document.getElementById('mpr').value)||0;if(!n||!pr){alert('Complete nombre y precio');return;}const eid=document.getElementById('mid').value;const obj={id:eid?parseInt(eid):Date.now(),n,c:document.getElementById('mc').value,d:document.getElementById('md').value.trim(),p:pr,u:document.getElementById('mu').value};if(eid){prods[prods.findIndex(x=>x.id===parseInt(eid))]=obj;}else prods.push(obj);sv();cM('mo-p');rP();}
function dP(id){if(!confirm('Eliminar este producto?'))return;prods=prods.filter(x=>x.id!==id);sv();rP();}
function oMI(){document.getElementById('si2').value='';document.getElementById('mi-form').style.display='none';sel=null;fc='Todos';rFC();rMI();oM('mo-i');}
function rFC(){const cats=['Todos',...new Set(prods.map(p=>p.c))];document.getElementById('fc').innerHTML=cats.map(c=>'<span class="chip '+(fc===c?'on':'')+'" onclick="sFC(\''+c+'\')">'+c+'</span>').join('');}
function sFC(c){fc=c;rFC();rMI();}
function rMI(){const q=(document.getElementById('si2')?.value||'').toLowerCase();const list=prods.filter(x=>(x.n.toLowerCase().includes(q)||x.d.toLowerCase().includes(q))&&(fc==='Todos'||x.c===fc));const el=document.getElementById('mi-list');if(!list.length){el.innerHTML='<div class="empty" style="padding:12px"><p>Sin resultados</p></div>';return;}el.innerHTML=list.map(x=>'<div class="ir" style="cursor:pointer;padding:10px 4px" onclick="selP('+x.id+')"><div class="in">'+x.n+'<br><span style="font-size:11px;color:var(--text2)">'+x.c+' - '+x.u+'</span></div><span class="ip">'+fm(x.p,'PYG')+'</span></div>').join('');}
function selP(id){sel=prods.find(x=>x.id===id);document.getElementById('mi-sel').textContent=sel.n;document.getElementById('iq2').value=1;document.getElementById('ip2').value=sel.p;document.getElementById('mi-form').style.display='block';uIS();document.getElementById('mi-form').scrollIntoView({behavior:'smooth'});}
function uIS(){const q=parseFloat(document.getElementById('iq2')?.value||1);const p=parseFloat(document.getElementById('ip2')?.value||0);document.getElementById('is').textContent='Subtotal: '+fm(q*p,gm());}
function aItem(){if(!sel){alert('Seleccione un producto');return;}const q=parseFloat(document.getElementById('iq2').value)||1,p=parseFloat(document.getElementById('ip2').value)||0;items.push({n:sel.n,c:sel.c,d:sel.d,q,p,u:sel.u});cM('mo-i');rI();}
function sQ(){const cli=document.getElementById('cn').value.trim();if(!cli){alert('Ingrese nombre del cliente');return;}if(!items.length){alert('Agregue al menos un producto');return;}const d=parseFloat(document.getElementById('desc').value)||0,sub=items.reduce((s,it)=>s+it.q*it.p,0),tot=sub-sub*d/100,num=quots.length>0?Math.max(...quots.map(x=>x.numero))+1:1;quots.push({id:Date.now(),numero:num,fecha:Date.now(),cliente:cli,tel:document.getElementById('ct').value,ciudad:document.getElementById('cc').value,direccion:document.getElementById('cd').value,obs:document.getElementById('co').value,validez:document.getElementById('cv').value,moneda:gm(),inst:document.getElementById('inst').value,items:[...items],descuento:d,subtotal:sub,total:tot});sv();items=[];resetN();alert('Presupuesto #'+String(num).padStart(4,'0')+' guardado!');pg('presupuestos');}
function vQ(id){curQ=quots.find(x=>x.id===id);if(!curQ)return;const q=curQ,m=q.moneda;document.getElementById('mv-t').textContent='Presupuesto #'+String(q.numero).padStart(4,'0');let h='<div class="ir2"><span class="lb">Cliente:</span><strong>'+q.cliente+'</strong></div>'+(q.tel?'<div class="ir2"><span class="lb">Tel:</span><span>'+q.tel+'</span></div>':'')+(q.ciudad?'<div class="ir2"><span class="lb">Ciudad:</span><span>'+q.ciudad+'</span></div>':'')+(q.direccion?'<div class="ir2"><span class="lb">Dir:</span><span>'+q.direccion+'</span></div>':'')+'<div class="ir2"><span class="lb">Fecha:</span><span>'+new Date(q.fecha).toLocaleDateString('es-PY',{day:'2-digit',month:'long',year:'numeric'})+'</span></div><div class="ir2"><span class="lb">Validez:</span><span>'+q.validez+' dias</span></div><div style="border-top:1px solid var(--border);margin:9px 0 7px;font-weight:700;font-size:13px">Productos:</div>'+q.items.map(it=>'<div class="ir"><div class="in">'+it.n+'<br><span style="font-size:11px;color:var(--text2)">'+it.q+'x '+fm(it.p,m)+'</span></div><span class="ip">'+fm(it.q*it.p,m)+'</span></div>').join('')+'<div style="border-top:1.5px solid var(--border);padding-top:9px;margin-top:6px"><div class="sr"><span>Subtotal</span><span>'+fm(q.subtotal,m)+'</span></div>'+(q.descuento>0?'<div class="sr" style="color:var(--danger)"><span>Descuento ('+q.descuento+'%)</span><span>-'+fm(q.subtotal*q.descuento/100,m)+'</span></div>':'')+'<div class="sr st"><span>TOTAL</span><span>'+fm(q.total,m)+'</span></div></div>'+(q.obs?'<div style="margin-top:8px;font-size:13px;color:var(--text2)">Obs: '+q.obs+'</div>':'');document.getElementById('mv-c').innerHTML=h;oM('mo-v');}
function dQ(){if(!curQ)return;if(!confirm('Eliminar presupuesto?'))return;quots=quots.filter(x=>x.id!==curQ.id);sv();cM('mo-v');rQ();}
function oM(id){document.getElementById(id).classList.add('open');}
function cM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(el=>{el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
function genPDF(){
  if(!curQ)return;
  if(!window.jspdf){alert('Cargando PDF, espere un momento...');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const q=curQ,m=q.moneda,W=210,ML=14,CW=W-ML*2;
  let y=0;
  doc.setFillColor(26,35,126);doc.rect(0,0,W,48,'F');
  try{doc.addImage('data:image/png;base64,'+LOGO,'PNG',ML,7,55,20);}
  catch(e){doc.setTextColor(255,255,255);doc.setFontSize(20);doc.setFont('helvetica','bold');doc.text('SISPIC',ML,22);doc.setFontSize(9);doc.text('developers',ML+32,22);}
  doc.setTextColor(200,210,255);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  const xR=W-ML;
  doc.text('RUC: '+TEC.r,xR,11,{align:'right'});
  doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
  doc.text(TEC.n,xR,17,{align:'right'});
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(200,210,255);
  doc.text('Tel: '+TEC.t,xR,23,{align:'right'});
  doc.text(TEC.d,xR,28,{align:'right'});
  TECA.forEach((a,i)=>doc.text('* '+a,xR,34+i*4.5,{align:'right'}));
  y=55;
  doc.setTextColor(26,35,126);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('PRESUPUESTO',ML,y);
  doc.setFontSize(11);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);
  doc.text('#'+String(q.numero).padStart(4,'0'),W-ML,y,{align:'right'});
  doc.setDrawColor(26,35,126);doc.setLineWidth(.5);doc.line(ML,y+2,W-ML,y+2);
  y+=10;
  doc.setFillColor(237,240,255);doc.roundedRect(ML,y,CW,30,3,3,'F');
  doc.setTextColor(26,35,126);doc.setFontSize(8);doc.setFont('helvetica','bold');
  doc.text('DATOS DEL CLIENTE',ML+4,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(30,30,30);
  doc.text('Cliente: '+q.cliente,ML+4,y+14);
  if(q.tel)doc.text('Tel.: '+q.tel,ML+4,y+20);
  if(q.ciudad||q.direccion)doc.text((q.ciudad?q.ciudad+' - ':'')+q.direccion,ML+4,y+26);
  const fd=new Date(q.fecha);
  doc.setTextColor(60,60,60);doc.setFontSize(8.5);
  doc.text('Fecha: '+fd.toLocaleDateString('es-PY',{day:'2-digit',month:'long',year:'numeric'}),W-ML-4,y+14,{align:'right'});
  doc.text('Validez: '+q.validez+' dias',W-ML-4,y+20,{align:'right'});
  doc.text('Moneda: '+m,W-ML-4,y+26,{align:'right'});
  y+=36;
  doc.setFillColor(26,35,126);doc.rect(ML,y,CW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
  doc.text('Descripcion',ML+3,y+5.5);
  doc.text('Cant.',ML+108,y+5.5,{align:'center'});
  doc.text('Precio Unit.',ML+138,y+5.5,{align:'center'});
  doc.text('Subtotal',W-ML-3,y+5.5,{align:'right'});
  y+=8;
  q.items.forEach((it,idx)=>{
    if(y>262){doc.addPage();y=15;}
    doc.setFillColor(idx%2===0?245:255,idx%2===0?246:255,idx%2===0?255:255);
    doc.rect(ML,y,CW,11,'F');
    doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
    doc.text(it.n.substring(0,52),ML+3,y+5.5);
    if(it.d){doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,100,100);doc.text(it.d.substring(0,55),ML+3,y+9);}
    doc.setFontSize(8.5);doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');
    doc.text(String(it.q)+' '+it.u,ML+108,y+5.5,{align:'center'});
    doc.text(fm(it.p,m),ML+138,y+5.5,{align:'center'});
    doc.setFont('helvetica','bold');
    doc.text(fm(it.q*it.p,m),W-ML-3,y+5.5,{align:'right'});
    doc.setDrawColor(200,205,240);doc.setLineWidth(.2);doc.line(ML,y+11,W-ML,y+11);
    y+=11;
  });
  y+=6;
  const TW=85,TX=W-ML-TW;
  if(q.descuento>0){
    doc.setFillColor(245,246,255);doc.rect(TX,y,TW,8,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(60,60,60);
    doc.text('Subtotal:',TX+3,y+5.5);doc.text(fm(q.subtotal,m),W-ML-3,y+5.5,{align:'right'});y+=8;
    doc.setFillColor(255,240,240);doc.rect(TX,y,TW,8,'F');doc.setTextColor(180,30,30);
    doc.text('Descuento ('+q.descuento+'%):',TX+3,y+5.5);doc.text('-'+fm(q.subtotal*q.descuento/100,m),W-ML-3,y+5.5,{align:'right'});y+=8;
  }
  doc.setFillColor(26,35,126);doc.rect(TX,y,TW,12,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('TOTAL:',TX+4,y+8);doc.text(fm(q.total,m),W-ML-3,y+8,{align:'right'});y+=20;
  if(q.obs){doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(80,80,80);doc.text('Observaciones: '+q.obs,ML,y);y+=8;}
  if(y<255){
    doc.setFillColor(250,250,255);doc.rect(ML,y,CW,22,'F');doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,35,126);
    doc.text('CONDICIONES:',ML+4,y+6);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);doc.setFontSize(7.5);
    doc.text('* Este presupuesto tiene validez de '+q.validez+' dias a partir de la fecha de emision.',ML+4,y+11);
    doc.text('* Los precios indicados son en '+m+' e incluyen IVA cuando corresponde.',ML+4,y+15);
    doc.text('* El servicio de instalacion '+(q.inst==='1'?'esta INCLUIDO en este presupuesto.':'NO esta incluido en este presupuesto.'),ML+4,y+19);
    y+=28;
  }
  const YF=285;doc.setDrawColor(26,35,126);doc.setLineWidth(.4);doc.line(ML,YF,W-ML,YF);
  doc.setFontSize(7.5);doc.setTextColor(100,100,100);doc.setFont('helvetica','normal');
  doc.text(TEC.e+' | RUC: '+TEC.r,W/2,YF+4,{align:'center'});
  doc.text('Tel: '+TEC.t+' | '+TEC.d,W/2,YF+8,{align:'center'});
  doc.setTextColor(160,160,180);doc.setFontSize(7);
  doc.text(TECA.join(' | '),W/2,YF+12,{align:'center'});
  doc.save('Presupuesto_'+String(q.numero).padStart(4,'0')+'_'+q.cliente.replace(/\s+/g,'_').substring(0,20)+'.pdf');
}
rQ();
</script>

<script>
// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW:', err));
  });
}

// PWA Install prompt
let deferredPrompt;
const installBtn = document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) installBtn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  if (installBtn) installBtn.style.display = 'none';
  deferredPrompt = null;
});
function installApp() {
  if (!deferredPrompt) {
    alert('Para instalar: en su navegador toque el menu (3 puntos) y seleccione "Agregar a pantalla de inicio" o "Instalar aplicacion"');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    deferredPrompt = null;
    if (installBtn) installBtn.style.display = 'none';
  });
}
</script>
